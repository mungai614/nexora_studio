{% extends 'base.html' %}
{% block title %}Portfolio | Nexora Studios{% endblock %}
{% load static %}
{% block content %}

<style>

/* ================= SECTION ================= */
.portfolio-section {
    padding: 140px 8%;
}

.portfolio-container {
    max-width: 1200px;
    margin: auto;
}

.portfolio-container h2 {
    font-size: 48px;
    margin-bottom: 60px;
    text-align: center;
}

/* ================= CATEGORY GRID ================= */
.portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 40px;
}

.portfolio-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 60px 30px;
    cursor: pointer;
    transition: 0.4s ease;
    text-align: center;
}

.portfolio-card:hover {
    transform: translateY(-10px);
    border: 1px solid #7c3aed;
    box-shadow: 0 0 60px rgba(124,58,237,0.3);
}

/* ================= MODALS ================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    padding: 40px;
    z-index: 999;
}

.modal-content {
    background: #11111a;
    padding: 40px;
    border-radius: 20px;
    max-width: 1100px;
    width: 100%;
}

.close-btn {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

/* ================= PROJECT GRID ================= */
.project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.project-card {
    background: rgba(255,255,255,0.04);
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.project-card:hover {
    background: rgba(124,58,237,0.15);
}

.project-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* ================= IMAGE SLIDER ================= */
.slider-container {
    position: relative;
    text-align: center;
}

.slider-container img {
    max-width: 90%;
    max-height: 75vh;
    border-radius: 15px;
}

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
    background: rgba(255,255,255,0.1);
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 50%;
}

.prev-btn { left: 10px; }
.next-btn { right: 10px; }

.slider-btn:hover {
    background: #7c3aed;
}

</style>

<section class="portfolio-section">
    <div class="portfolio-container">
        <h2>Our Portfolio</h2>


        <div class="portfolio-grid">
            <div class="portfolio-card" onclick="openCategory('web')">
                <h3>Web Development.</h3>
                <h4>click me</h4>
            </div>

            <div class="portfolio-card" onclick="openCategory('photo')">
                <h3>Photography.</h3>
                <h4>click me</h4>
            </div>

            <div class="portfolio-card" onclick="openCategory('design')">
                <h3>Creative Design.</h3>
                <h4>click me</h4>
            </div>
        </div>
    </div>
</section>

<!-- CATEGORY MODAL -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeCategory()">&times;</span>
        <h2 id="categoryTitle"></h2>
        <div id="projectGrid" class="project-grid"></div>
    </div>
</div>

<!-- GALLERY MODAL -->
<div id="galleryModal" class="modal">
    <div class="modal-content slider-container">
        <span class="close-btn" onclick="closeGallery()">&times;</span>
        <span class="slider-btn prev-btn" onclick="prevImage()">‹</span>
        <img id="sliderImage">
        <span class="slider-btn next-btn" onclick="nextImage()">›</span>
    </div>
</div>

<script>

let currentImages = [];
let currentIndex = 0;

const projects = {
    web: [
        {
            title: "Stock management System",

            thumb: "{% static 'images/one.png' %}",
            images: [
                "{% static 'images/one.png' %}",
                "{% static 'images/one.png' %}",
                "{% static 'images/one.png' %}"
            ]
        },
        {
            title: "Chemist management System",
            thumb: "{% static 'images/two.png' %}",
            images: [
                "{% static 'images/two.png' %}",
                "{% static 'images/two.png' %}"
            ]
        },
        {
            title: "Organization management System",
            thumb: "{% static 'images/three.png' %}",
            images: [
                "{% static 'images/three.png' %}",
                "{% static 'images/three.png' %}"
            ]
        },
        {
            title: "Mental support $ addiction recovery",
            thumb: "{% static 'images/four.png' %}",
            images: [
                "{% static 'images/four.png' %}",
                "{% static 'images/four.png' %}"
            ]
        }
    ],

    photo: [
        {
            title: "Event Coverage 2025",
            thumb: "{% static 'images/two.png' %}",
            images: [
                "{% static 'images/two.png' %}",
                "{% static 'images/one.png' %}"
            ]
        }
    ],

    design: [
        {
            title: "Marketing Poster Campaign",
            thumb: "{% static 'images/one.png' %}",
            images: [
                "{% static 'images/one.png' %}",
                "{% static 'images/two.png' %}"
            ]
        }
    ]
};

function openCategory(category) {
    const modal = document.getElementById('categoryModal');
    const grid = document.getElementById('projectGrid');
    const title = document.getElementById('categoryTitle');

    grid.innerHTML = '';
    title.textContent = category.toUpperCase();

    projects[category].forEach(project => {
        const card = document.createElement('div');
        card.classList.add('project-card');
        card.innerHTML = `
            <img src="${project.thumb}">
            <h4>${project.title}</h4>
        `;
        card.onclick = () => openGallery(project.images);
        grid.appendChild(card);
    });

    modal.style.display = "flex";
}

function closeCategory() {
    document.getElementById('categoryModal').style.display = "none";
}

function openGallery(images) {
    currentImages = images;
    currentIndex = 0;
    document.getElementById('sliderImage').src = currentImages[currentIndex];
    document.getElementById('galleryModal').style.display = "flex";
}

function closeGallery() {
    document.getElementById('galleryModal').style.display = "none";
}

function nextImage() {
    currentIndex = (currentIndex + 1) % currentImages.length;
    document.getElementById('sliderImage').src = currentImages[currentIndex];
}

function prevImage() {
    currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    document.getElementById('sliderImage').src = currentImages[currentIndex];
}

</script>

{% endblock %}
